name: supersurf-sandbox

services:
  web:
    image: supersurf-billing:${SUPERSURF_DEPLOYMENT_REVISION:?Set SUPERSURF_DEPLOYMENT_REVISION}
    env_file:
      - ${SUPERSURF_SANDBOX_ENV_FILE:-/opt/supersurf-sandbox/shared/sandbox.env}
    environment:
      SUPERSURF_DEPLOYMENT_REVISION: ${SUPERSURF_DEPLOYMENT_REVISION:?Set SUPERSURF_DEPLOYMENT_REVISION}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "uv", "run", "--no-dev", "python", "manage.py", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  postgres:
    image: postgres:17-alpine
    env_file:
      - ${SUPERSURF_SANDBOX_ENV_FILE:-/opt/supersurf-sandbox/shared/sandbox.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    shm_size: 128mb
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  broker:
    image: valkey/valkey:8-alpine
    command:
      - valkey-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
    restart: unless-stopped
    mem_limit: 192m
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
