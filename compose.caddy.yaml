# Local TLS/reverse-proxy preview only. This profile does not make runserver production-ready.
services:
  caddy:
    image: caddy:2-alpine
    profiles: ["local-tls-preview"]
    ports:
      - "8080:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      web:
        condition: service_healthy
